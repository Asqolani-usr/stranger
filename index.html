<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Untuk Kak Safira</title>
  <!-- Google Fonts: Outfit (headings) & Poppins (body) -->
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Poppins:wght@300;400;500;600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="https://i.ibb.co.com/hXZsYxZ/heart.png">
</head>

<body>
  <!-- Canvas for magical mouse heart-trail -->
  <canvas id="trailCanvas"></canvas>

  <!-- Interactive Background Floating Decors -->
  <div class="background-decor" id="bgDecor">
    <!-- Will be populated dynamically by JS for more variation -->
  </div>

  <!-- Floating Music Controller -->
  <div class="music-controller">
    <button id="musicBtn" class="music-btn" onclick="toggleMusic()" aria-label="Toggle Music">
      <span class="disc">💿</span>
    </button>
    <div class="visualizer" id="visualizer">
      <span class="bar"></span>
      <span class="bar"></span>
      <span class="bar"></span>
      <span class="bar"></span>
    </div>
  </div>

  <audio id="audio" loop>
    <source src="lagu.mp4" type="audio/mp4">
    Your browser does not support the audio element.
  </audio>

  <div class="container">

    <!-- STAGE 1: Interactive Envelope -->
    <div id="envelopeWrapper" class="active">
      <div class="envelope" onclick="openEnvelope()">
        <div class="flap"></div>
        <div class="pocket"></div>
        <div class="letter">
          <div class="letter-preview">
            <h3>Hai Cantik... ✨</h3>
            <p>Ada pesan rahasia buat kamu.</p>
            <p class="tap-hint">Klik untuk membuka 💌</p>
          </div>
        </div>
        <div class="heart-seal">❤️</div>
      </div>
    </div>

    <!-- STAGE 2: Message Card (Typewriter Popup) -->
    <div id="popupCard" class="card">
      <div class="card-header">
        <div class="sparkles">✨💖✨</div>
      </div>
      <div class="card-body">
        <p id="popupText" class="typewriter-text"></p>
      </div>
      <div class="card-footer">
        <button id="nextBtn" onclick="nextPopup()">Ketuk untuk membaca... 💌</button>
      </div>
    </div>

    <!-- STAGE 3: Question Card -->
    <div id="questionPage" class="card">
      <div class="card-header">
        <div class="floating-hearts">👀💝</div>
      </div>
      <div class="card-body">
        <h2>mau lihat kumpulan foto gadis yang aku sukai?</h2>
      </div>
      <div class="card-footer button-group">
        <button id="yesBtn" onclick="goToGallery()">Mau banget! 💖</button>
        <button id="noBtn" onclick="moveNoBtn()">Tidaa 🥺</button>
      </div>
    </div>

    <!-- STAGE 4: Polaroid Swipe Gallery -->
    <div id="galleryPage" class="card">
      <div class="card-header">
        <h2>gadis tercantik yang pernah kutemui 💗💞</h2>
      </div>
      <div class="card-body stack-wrapper">
        <!-- Tinder-style swipeable card deck -->
        <div class="polaroid-stack" id="polaroidStack">
          <!-- Dynamically generated Polaroid cards via JS -->
        </div>
      </div>
      <div class="card-footer gallery-controls">
        <button class="nav-btn prev-btn" onclick="swipeLeft()" title="Geser Kiri">💔 Geser Kiri</button>
        <button class="nav-btn next-btn" onclick="swipeRight()" title="Geser Kanan">💖 Geser Kanan</button>
      </div>
    </div>

  </div>

  <script src="script.js"></script>
</body>

</html>
